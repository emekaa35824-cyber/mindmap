<style>
  :root{
    --bg:#14161f;--panel:#1b1e2a;--panel-border:#2a2e3d;
    --field:#10121b;--field-border:#2f3344;--text:#e8e8ec;
    --text-dim:#8c90a3;--accent:#ffa94d;--accent-text:#1a1207;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;overscroll-behavior:none;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  #app{display:flex;flex-direction:column;height:100dvh;}
  header.panel{flex:0 0 auto;background:var(--panel);border-bottom:1px solid var(--panel-border);padding:12px 14px 10px;}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .row+.row{margin-top:8px;}
  .brand{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:700;white-space:nowrap;}
  input#titleInput{flex:1;min-width:120px;background:var(--field);border:1px solid var(--field-border);color:var(--text);border-radius:8px;padding:8px 11px;font-size:13px;-webkit-appearance:none;}
  input#titleInput:focus{outline:none;border-color:var(--accent);}
  textarea#noteInput{width:100%;min-height:100px;max-height:35vh;resize:vertical;background:var(--field);border:1px solid var(--field-border);color:var(--text);border-radius:8px;padding:10px 12px;font-family:SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace;font-size:13px;line-height:1.5;-webkit-appearance:none;}
  textarea#noteInput:focus{outline:none;border-color:var(--accent);}
  button{cursor:pointer;border-radius:8px;border:1px solid var(--field-border);background:#232737;color:var(--text);padding:8px 14px;font-size:13px;font-weight:600;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  button:active{opacity:.8;}
  button.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-text);}
  button.ghost{background:transparent;}
  .hint{margin-top:6px;font-size:11px;color:var(--text-dim);}
  header.collapsed textarea#noteInput,header.collapsed .hint{display:none;}
  main#mapArea{flex:1 1 auto;position:relative;overflow:hidden;}
  svg#mapSvg{width:100%;height:100%;display:block;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;}
  svg#mapSvg.panning{cursor:grabbing;}
  .empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--text-dim);font-size:14px;padding:40px;pointer-events:none;gap:12px;}
  .empty-state .icon{font-size:48px;opacity:.4;}
  .empty-state strong{color:var(--text);}
  .controls{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
  .controls .group{display:flex;gap:6px;}
  .controls button{width:44px;height:44px;padding:0;font-size:18px;display:flex;align-items:center;justify-content:center;background:#1f2230cc;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
  .controls .wide{width:auto;padding:0 14px;}
  .controls .caption{font-size:10px;color:var(--text-dim);background:#1f2230cc;padding:3px 8px;border-radius:6px;}
  @media(max-width:640px){.brand{display:none;}.hint{display:none;}textarea#noteInput{min-height:80px;}}
</style>
</head>
<body>
<div id="app">
  <header class="panel" id="panel">
    <div class="row">
      <span class="brand">Notes → Mind&nbsp;Map</span>
      <input id="titleInput" type="text" placeholder="Central topic (optional)" autocomplete="off" spellcheck="false">
      <button id="sampleBtn" class="ghost" type="button">Example</button>
      <button id="generateBtn" class="primary" type="button">Generate</button>
      <button id="collapseBtn" class="ghost" type="button">Hide ▲</button>
    </div>
    <div class="row">
      <textarea id="noteInput" placeholder="Paste your notes here.

Indent lines (or use -, *, or # headings) to show structure:

Quarterly Plan
  Marketing
    Social campaign
    Press release
  Engineering
    Backend
    Frontend
  Budget
    40k allocated" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    </div>
    <div class="hint">Indentation, bullets (- * •), numbered lists, and # headings all create sub-branches.</div>
  </header>
  <main id="mapArea">
    <svg id="mapSvg" viewBox="0 0 900 600" preserveAspectRatio="xMidYMid meet">
      <g id="content"></g>
    </svg>
    <div class="empty-state" id="emptyState">
      <div class="icon">🗺️</div>
      <div>Paste your notes above and tap <strong>Generate</strong>.<br>Everything runs on your device — nothing is sent anywhere.</div>
    </div>
    <div class="controls">
      <span class="caption">Pinch to zoom · drag to pan</span>
      <div class="group">
        <button id="downloadBtn" class="wide" type="button">⬇ PNG</button>
        <button id="zoomInBtn" type="button">+</button>
        <button id="zoomOutBtn" type="button">–</button>
        <button id="resetViewBtn" type="button">⤾</button>
      </div>
    </div>
  </main>
</div>
<script>
(function(){
"use strict";
var FONT_FAMILY="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif";
var PALETTE=['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#38d9a9','#4dabf7','#9775fa','#f783ac'];
var LINE_H=17,PAD_X=14,PAD_Y=9,LEVEL_GAP=56,V_GAP=14,MAX_W_CENTRAL=230,MAX_W_NODE=190;
var SAMPLE="Quarterly Marketing Plan\n  Social Media\n    Instagram campaign\n    TikTok influencer push\n    Posting schedule\n  Email\n    Newsletter redesign\n    Welcome series for new signups\n  Events\n    Trade show booth\n    Monthly webinar series\n  Budget\n    Total 85000\n    Split 40 social 30 email 30 events\n  Timeline\n    Kickoff July 1\n    Midpoint review August 15\n    Wrap up September 30";
var noteInput=document.getElementById('noteInput'),titleInput=document.getElementById('titleInput');
var generateBtn=document.getElementById('generateBtn'),sampleBtn=document.getElementById('sampleBtn');
var collapseBtn=document.getElementById('collapseBtn'),panel=document.getElementById('panel');
var svg=document.getElementById('mapSvg'),content=document.getElementById('content');
var emptyState=document.getElementById('emptyState');
var zoomInBtn=document.getElementById('zoomInBtn'),zoomOutBtn=document.getElementById('zoomOutBtn');
var resetViewBtn=document.getElementById('resetViewBtn'),downloadBtn=document.getElementById('downloadBtn');
var measureCanvas=document.createElement('canvas'),mctx=measureCanvas.getContext('2d');
var view={x:0,y:0,w:900,h:600},currentBBox=null;
function parseNotes(text,titleOverride){
  var lines=text.split('\n'),root={text:'__ROOT__',children:[]},stack=[{indent:-1,node:root}],OFFSET=1000;
  for(var i=0;i<lines.length;i++){
    var raw=lines[i];if(!raw.trim())continue;
    var indent,contentText,hm=raw.match(/^(\s*)(#{1,6})\s+(.*)$/);
    if(hm){indent=hm[2].length*4;contentText=hm[3].trim();}
    else{
      var ws=raw.match(/^(\s*)/)[1],wsCount=ws.replace(/\t/g,'    ').length;
      var rest=raw.slice(ws.length),bm=rest.match(/^([-*•]|\d+[.)])\s+(.*)$/);
      if(bm)rest=bm[2];contentText=rest.trim();if(!contentText)continue;indent=OFFSET+wsCount;
    }
    while(stack.length>1&&stack[stack.length-1].indent>=indent)stack.pop();
    var parent=stack[stack.length-1].node,node={text:contentText,children:[]};
    parent.children.push(node);stack.push({indent:indent,node:node});
  }
  var label=titleOverride&&titleOverride.trim();
  if(label)return{text:label,children:root.children};
  if(root.children.length===1){var o=root.children[0];return{text:o.text,children:o.children};}
  return{text:'Mind Map',children:root.children};
}
function wrapText(text,maxWidth){
  var words=text.split(/\s+/).filter(Boolean),lines=[],current='';
  for(var i=0;i<words.length;i++){
    var w=words[i],test=current?current+' '+w:w;
    if(mctx.measureText(test).width>maxWidth&&current){lines.push(current);current=w;}else{current=test;}
  }
  if(current)lines.push(current);if(!lines.length)lines.push('');return lines;
}
function sizeNode(node,isCentral){
  var fontSize=isCentral?15:(node.depth===1?13.5:12.5),weight=isCentral?700:(node.depth===1?600:500);
  mctx.font=weight+' '+fontSize+'px '+FONT_FAMILY;
  var maxW=isCentral?MAX_W_CENTRAL:MAX_W_NODE,lines=wrapText(node.text||'(untitled)',maxW),widest=0;
  for(var i=0;i<lines.length;i++)widest=Math.max(widest,mctx.measureText(lines[i]).width);
  node.lines=lines;node.fontSize=fontSize;node.fontWeight=weight;
  node.boxW=widest+PAD_X*2;node.boxH=lines.length*LINE_H+PAD_Y*2;
}
function layoutY(branches){
  var cursor=0;
  function walk(node){
    if(!node.children.length){node.y=cursor+node.boxH/2;cursor+=node.boxH+V_GAP;}
    else{
      for(var i=0;i<node.children.length;i++)walk(node.children[i]);
      node.y=(node.children[0].y+node.children[node.children.length-1].y)/2;
    }
  }
  for(var i=0;i<branches.length;i++)walk(branches[i]);
  if(branches.length){
    var off=Math.max(0,cursor-V_GAP)/2;
    var shift=function(n){n.y-=off;for(var i=0;i<n.children.length;i++)shift(n.children[i]);};
    for(var j=0;j<branches.length;j++)shift(branches[j]);
  }
}
function computeLayout(root){
  sizeNode(root,true);root.depth=0;
  (function sizeAll(node,depth){
    for(var i=0;i<node.children.length;i++){var c=node.children[i];c.depth=depth;sizeNode(c,false);sizeAll(c,depth+1);}
  })(root,1);
  root.color=null;root.dir=0;
  for(var i=0;i<root.children.length;i++){root.children[i].color=PALETTE[i%PALETTE.length];root.children[i].dir=(i%2===0)?1:-1;}
  var assignMeta=function(node){for(var i=0;i<node.children.length;i++){node.children[i].color=node.color;node.children[i].dir=node.dir;assignMeta(node.children[i]);}};
  for(var k=0;k<root.children.length;k++)assignMeta(root.children[k]);
  var right=root.children.filter(function(b){return b.dir===1;}),left=root.children.filter(function(b){return b.dir===-1;});
  layoutY(right);layoutY(left);root.y=0;root.x=0;
  function assignX(node,dir){for(var i=0;i<node.children.length;i++){var c=node.children[i];c.x=node.x+dir*(node.boxW/2+LEVEL_GAP+c.boxW/2);assignX(c,dir);}}
  right.forEach(function(b){b.x=root.x+(root.boxW/2+LEVEL_GAP+b.boxW/2);assignX(b,1);});
  left.forEach(function(b){b.x=root.x-(root.boxW/2+LEVEL_GAP+b.boxW/2);assignX(b,-1);});
  var nodes=[root],links=[],minX=root.x-root.boxW/2,maxX=root.x+root.boxW/2,minY=root.y-root.boxH/2,maxY=root.y+root.boxH/2;
  (function collect(node){
    for(var i=0;i<node.children.length;i++){
      var c=node.children[i];nodes.push(c);links.push({parent:node,child:c});
      minX=Math.min(minX,c.x-c.boxW/2);maxX=Math.max(maxX,c.x+c.boxW/2);
      minY=Math.min(minY,c.y-c.boxH/2);maxY=Math.max(maxY,c.y+c.boxH/2);collect(c);
    }
  })(root);
  return{nodes:nodes,links:links,bbox:{minX:minX,minY:minY,maxX:maxX,maxY:maxY}};
}
function escapeXml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');}
function hexToRgba(hex,alpha){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+alpha+')';}
function nodeTextSvg(node,textColor){
  var n=node.lines.length,out='';
  for(var i=0;i<n;i++){
    var ty=node.y+(i-(n-1)/2)*LINE_H;
    out+='<text x="'+node.x+'" y="'+ty+'" text-anchor="middle" dominant-baseline="middle" font-family="'+FONT_FAMILY+'" font-size="'+node.fontSize+'" font-weight="'+node.fontWeight+'" fill="'+textColor+'">'+escapeXml(node.lines[i])+'</text>';
  }
  return out;
}
function buildMarkup(layout){
  var links=layout.links.map(function(l){
    var p=l.parent,c=l.child,dir=(c.x>=p.x)?1:-1;
    var sx=p.x+dir*p.boxW/2,sy=p.y,ex=c.x-dir*c.boxW/2,ey=c.y,dx=(ex-sx)*0.55;
    return'<path d="M '+sx+' '+sy+' C '+(sx+dx)+' '+sy+', '+(ex-dx)+' '+ey+', '+ex+' '+ey+'" fill="none" stroke="'+(c.color||'#888')+'" stroke-width="'+Math.max(1.4,5-c.depth*0.55)+'" stroke-linecap="round" opacity="0.75"/>';
  }).join('');
  var nodesSvg=layout.nodes.map(function(node){
    var isCentral=node.depth===0,isMain=node.depth===1,fill,stroke,textColor;
    if(isCentral){fill='#242838';stroke='#eef0f5';textColor='#f5f5f7';}
    else if(isMain){fill=node.color;stroke=node.color;textColor='#15161c';}
    else{fill=hexToRgba(node.color,0.16);stroke=node.color;textColor='#e7e7ec';}
    return'<g><rect x="'+(node.x-node.boxW/2)+'" y="'+(node.y-node.boxH/2)+'" width="'+node.boxW+'" height="'+node.boxH+'" rx="'+(isCentral?14:10)+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(isCentral?2:1.4)+'"/>'+nodeTextSvg(node,textColor)+'</g>';
  }).join('');
  return links+nodesSvg;
}
function applyViewBox(){svg.setAttribute('viewBox',view.x+' '+view.y+' '+view.w+' '+view.h);}
function fitToView(bbox){
  var PAD=60,w=Math.max(bbox.maxX-bbox.minX,0)+PAD*2,h=Math.max(bbox.maxY-bbox.minY,0)+PAD*2;
  w=Math.max(w,360);h=Math.max(h,260);
  view={x:(bbox.minX+bbox.maxX)/2-w/2,y:(bbox.minY+bbox.maxY)/2-h/2,w:w,h:h};applyViewBox();
}
function zoomAt(factor,clientX,clientY){
  var rect=svg.getBoundingClientRect();
  var wx=view.x+((clientX-rect.left)/rect.width)*view.w,wy=view.y+((clientY-rect.top)/rect.height)*view.h;
  var ox=(wx-view.x)/view.w,oy=(wy-view.y)/view.h;
  view.w*=factor;view.h*=factor;view.x=wx-ox*view.w;view.y=wy-oy*view.h;applyViewBox();
}
function zoomBy(factor){var cx=view.x+view.w/2,cy=view.y+view.h/2;view.w*=factor;view.h*=factor;view.x=cx-view.w/2;view.y=cy-view.h/2;applyViewBox();}
svg.addEventListener('wheel',function(e){e.preventDefault();zoomAt(e.deltaY>0?1.12:0.89,e.clientX,e.clientY);},{passive:false});
var activePointers=new Map();
svg.addEventListener('pointerdown',function(e){activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});svg.setPointerCapture(e.pointerId);svg.classList.add('panning');});
svg.addEventListener('pointermove',function(e){
  if(!activePointers.has(e.pointerId))return;
  var prev=activePointers.get(e.pointerId);activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(activePointers.size===1){
    var rect=svg.getBoundingClientRect();view.x-=(e.clientX-prev.x)*(view.w/rect.width);view.y-=(e.clientY-prev.y)*(view.h/rect.height);applyViewBox();
  }else if(activePointers.size===2){
    var pts=[],prevPts=[];
    activePointers.forEach(function(pos,id){pts.push(pos);prevPts.push(id===e.pointerId?prev:pos);});
    var newDist=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y),prevDist=Math.hypot(prevPts[0].x-prevPts[1].x,prevPts[0].y-prevPts[1].y);
    if(prevDist>0&&newDist>0)zoomAt(prevDist/newDist,(pts[0].x+pts[1].x)/2,(pts[0].y+pts[1].y)/2);
  }
});
['pointerup','pointercancel'].forEach(function(evt){svg.addEventListener(evt,function(e){activePointers.delete(e.pointerId);if(activePointers.size===0)svg.classList.remove('panning');});});
zoomInBtn.addEventListener('click',function(){zoomBy(0.82);});
zoomOutBtn.addEventListener('click',function(){zoomBy(1.22);});
resetViewBtn.addEventListener('click',function(){if(currentBBox)fitToView(currentBBox);});
function generateMap(){
  var text=noteInput.value;if(!text.trim()){emptyState.style.display='flex';content.innerHTML='';return;}
  var layout=computeLayout(parseNotes(text,titleInput.value));
  content.innerHTML=buildMarkup(layout);currentBBox=layout.bbox;fitToView(currentBBox);emptyState.style.display='none';
}
generateBtn.addEventListener('click',generateMap);
noteInput.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();generateMap();}});
sampleBtn.addEventListener('click',function(){noteInput.value=SAMPLE;titleInput.value='';generateMap();});
collapseBtn.addEventListener('click',function(){var c=panel.classList.toggle('collapsed');collapseBtn.textContent=c?'Notes ▼':'Hide ▲';});
downloadBtn.addEventListener('click',function(){
  if(!currentBBox)return;
  var PAD=50,w=Math.max(currentBBox.maxX-currentBBox.minX,0)+PAD*2,h=Math.max(currentBBox.maxY-currentBBox.minY,0)+PAD*2;
  var x=currentBBox.minX-PAD,y=currentBBox.minY-PAD;
  var svgStr='<svg xmlns="http://www.w3.org/2000/svg" width="'+Math.round(w)+'" height="'+Math.round(h)+'" viewBox="'+x+' '+y+' '+w+' '+h+'"><rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="#14161f"/>'+content.innerHTML+'</svg>';
  var blob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'}),url=URL.createObjectURL(blob),img=new Image();
  img.onload=function(){
    var sc=2,canvas=document.createElement('canvas');canvas.width=Math.round(w*sc);canvas.height=Math.round(h*sc);
    var ctx=canvas.getContext('2d');ctx.fillStyle='#14161f';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);URL.revokeObjectURL(url);
    canvas.toBlob(function(blob){var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mindmap.png';document.body.appendChild(a);a.click();document.body.removeChild(a);});
  };
  img.onerror=function(){URL.revokeObjectURL(url);alert('PNG render failed.');};
  img.src=url;
});
applyViewBox();
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(err){console.warn('SW registration failed:',err);});
  });
}
})();
</script>
